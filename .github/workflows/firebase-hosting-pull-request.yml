# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on PR
on: pull_request
concurrency:
  group: firebase-hosting-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.1
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze
        run: dart analyze lib test
      - name: Test
        run: flutter test
      - name: Build web
        timeout-minutes: 15
        run: flutter build web --release --no-wasm-dry-run
      - name: Verify Firebase Hosting public directory
        shell: bash
        run: |
          test -f build/web/index.html
          test -f build/web/main.dart.js
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GOODWILL_CIRCLE }}
          projectId: goodwill-circle
